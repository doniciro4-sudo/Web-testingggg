<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikSave Pro | Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ea;
            --secondary: #ff0050;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ANIMASI BACKGROUND GRADASI BERGERAK */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050505 100%);
            z-index: -2;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: moveOrb 20s infinite alternate;
        }

        @keyframes moveOrb {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* GLASSMORPHISM CARD */
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        /* INPUT STYLE */
        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        /* BUTTON NEON GLOW */
        .btn-neon {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            background-size: 200% auto;
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }
        .btn-neon:hover {
            background-position: right center;
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.5);
            transform: translateY(-3px);
        }

        /* ANIMASI FADE IN UP */
        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="orb bg-indigo-600 top-0 left-0"></div>
    <div class="orb bg-pink-900 bottom-0 right-0" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-lg p-6">
        <div class="premium-card p-10 fade-up text-center">
            
            <header class="mb-10">
                <div class="inline-block p-3 rounded-2xl bg-white/5 mb-4 border border-white/10">
                    <svg class="w-10 h-10 text-cyan-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.89-.6-4.13-1.47V18.77a6.738 6.738 0 0 1-6.74 6.74c-3.72 0-6.74-3.02-6.74-6.74 0-3.72 3.02-6.74 6.74-6.74.25 0 .5.02.75.05V16.3c-.25-.02-.5-.03-.75-.03-1.44 0-2.61 1.17-2.61 2.61s1.17 2.61 2.61 2.61c1.44 0 2.61-1.17 2.61-2.61V.02z"/></svg>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tighter">TIKSAVE <span class="text-cyan-400">PRO</span></h1>
                <p class="text-slate-400 text-sm mt-2">Ultra HD TikTok Downloader</p>
            </header>

            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="videoUrl" placeholder="Tempel link video di sini..." 
                        class="w-full glass-input p-5 rounded-2xl focus:outline-none text-white text-center">
                </div>
                
                <button onclick="fetchVideo()" id="btnAction"
                    class="w-full btn-neon text-white font-bold py-5 rounded-2xl text-sm uppercase tracking-widest flex items-center justify-center gap-3">
                    <span id="btnText">Ambil Video</span>
                    <div id="btnLoader" class="hidden loader"></div>
                </button>
            </div>

            <div id="result" class="hidden mt-10 pt-8 border-t border-white/10 space-y-4">
                <div class="py-2 px-4 rounded-full bg-cyan-500/10 text-cyan-400 text-[10px] font-bold uppercase inline-block mb-2">Video Terdeteksi</div>
                
                <button id="downloadBtn" 
                    class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    SIMPAN KE GALERI
                </button>
            </div>

            <p id="errorMsg" class="hidden text-red-400 text-xs mt-6 bg-red-500/10 p-4 rounded-2xl border border-red-500/20"></p>
        </div>

        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-[0.2em]">© 2026 Developed with Love</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
