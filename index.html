<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010101; font-family: 'sans-serif'; color: white; }
        .tk-card { background: #121212; border: 1px solid #333; border-radius: 24px; }
        .btn-gradient { background: linear-gradient(45deg, #ff0050, #00f2ea); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-5">

    <div class="w-full max-w-md tk-card p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2 tracking-tighter">TIK-SAVE</h1>
            <p class="text-gray-400 text-sm">Download Video TikTok Tanpa Watermark</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="videoUrl" placeholder="Tempel link video di sini..." 
                class="w-full p-4 rounded-xl bg-black border border-gray-700 focus:outline-none focus:border-cyan-400 transition-all text-white">
            
            <button onclick="fetchVideo()" id="btnAction"
                class="w-full btn-gradient text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-wider">
                Ambil Video
            </button>
        </div>

        <div id="result" class="hidden mt-8 pt-6 border-t border-gray-800 animate-pulse">
            <div class="flex flex-col items-center gap-4">
                <div class="bg-green-500/10 text-green-400 px-4 py-2 rounded-full text-xs font-bold uppercase">
                    ✨ Video Siap!
                </div>
                <button id="downloadBtn" 
                    class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-gray-200 transition-all">
                    SIMPAN KE GALERI
                </button>
                <p class="text-[10px] text-gray-500 italic">Kualitas HD - Tanpa Watermark</p>
            </div>
        </div>

        <p id="errorMsg" class="hidden text-red-500 text-center mt-4 text-xs italic"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
